<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahithyolsav - Nilambur Division</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #f97316;
            --brand-dark: #111827;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }

        @font-face {
            font-family: 'CooperBlack';
            src: local('Cooper Black'), local('CooperBlack');
            font-weight: bold;
        }

        .font-ssf { font-family: 'CooperBlack', serif; font-weight: 900; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Animations */
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 25s linear infinite;
        }
        .ticker-container:hover .ticker-text {
            animation-play-state: paused;
        }

        /* Scratch Card Effect */
        .scratch-container {
            position: relative;
            width: 90px;
            height: 50px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--brand-orange);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .scratch-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #64748b 0%, #94a3b8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 800;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }
        .scratched .scratch-overlay { 
            opacity: 0; 
            pointer-events: none; 
            transform: scale(1.5) rotate(15deg);
        }
        .scratched {
            border-color: var(--brand-orange);
            background: #fff7ed;
        }

        .loader {
            border-top-color: var(--brand-orange);
            animation: spinner 0.8s linear infinite;
        }
        @keyframes spinner {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-slate-900">

    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-[60] border-b border-slate-100">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-4 group cursor-pointer" onclick="navigate('home')">
                <div class="p-2 bg-orange-50 rounded-xl group-hover:bg-orange-100 transition-colors">
                    <img src="Sahithyolsav (en)_1.png" alt="Logo" class="h-10 md:h-12" onerror="this.src='https://placehold.co/100x40?text=SSF+NILAMBUR'">
                </div>
                <div>
                    <h1 class="font-ssf text-2xl md:text-3xl text-orange-600 leading-none">SSF</h1>
                    <p class="text-[10px] md:text-xs font-extrabold tracking-[0.2em] text-slate-500 uppercase">Nilambur Division</p>
                </div>
            </div>
            
            <nav class="hidden lg:flex items-center gap-8 font-semibold text-sm text-slate-600">
                <button onclick="navigate('home')" class="hover:text-orange-600 transition-colors">Home</button>
                <button onclick="navigate('about')" class="hover:text-orange-600 transition-colors">About</button>
                <button onclick="navigate('gallery')" class="hover:text-orange-600 transition-colors">Gallery</button>
                <button onclick="navigate('videos')" class="hover:text-orange-600 transition-colors">Videos</button>
                <button onclick="navigate('results')" class="hover:text-orange-600 transition-colors">Results</button>
                <button onclick="openLoginModal()" class="bg-slate-900 text-white px-6 py-2 rounded-full hover:bg-orange-600 transition-all shadow-md">Portal Login</button>
            </nav>
            
            <button class="lg:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg" onclick="toggleMobileMenu()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
        
        <!-- News Ticker -->
        <div class="bg-orange-600 text-white py-1.5 ticker-container overflow-hidden text-xs font-bold uppercase tracking-wider relative">
            <div class="absolute left-0 top-0 h-full bg-orange-700 px-3 z-10 flex items-center">LATEST</div>
            <div class="ticker-text pl-20" id="news-ticker">
                Welcome to Sahithyolsav 2025 Nilambur Division! Stay tuned for live updates and results.
            </div>
        </div>
    </header>

    <!-- Mobile Nav Menu -->
    <div id="mobile-menu" class="hidden fixed inset-0 bg-white z-[70] p-6 flex flex-col gap-6">
        <div class="flex justify-between items-center mb-8">
            <span class="font-ssf text-2xl text-orange-600">MENU</span>
            <button onclick="toggleMobileMenu()" class="p-2 text-slate-400">Close</button>
        </div>
        <button onclick="navigate('home'); toggleMobileMenu()" class="text-xl font-bold border-b pb-4 text-left">Home</button>
        <button onclick="navigate('about'); toggleMobileMenu()" class="text-xl font-bold border-b pb-4 text-left">About</button>
        <button onclick="navigate('gallery'); toggleMobileMenu()" class="text-xl font-bold border-b pb-4 text-left">Gallery</button>
        <button onclick="navigate('results'); toggleMobileMenu()" class="text-xl font-bold border-b pb-4 text-left">Results</button>
        <button onclick="openLoginModal(); toggleMobileMenu()" class="mt-auto bg-orange-600 text-white py-4 rounded-2xl font-bold">Portal Login</button>
    </div>

    <main id="app-view" class="min-h-[80vh]">
        <!-- Content will be injected here -->
        <div class="flex items-center justify-center h-[60vh]">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-12 w-12"></div>
        </div>
    </main>

    <!-- Modals & Overlays -->
    <div id="login-modal" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl relative">
            <button onclick="closeLoginModal()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-600">&times;</button>
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold">Portal Login</h2>
            </div>
            <div class="space-y-4">
                <input type="text" id="login-id" placeholder="Login ID" class="w-full bg-slate-50 border p-3 rounded-xl outline-none">
                <input type="password" id="login-pwd" placeholder="Password" class="w-full bg-slate-50 border p-3 rounded-xl outline-none">
                <button onclick="handleLogin()" class="w-full bg-orange-600 text-white py-4 rounded-xl font-bold">Sign In</button>
            </div>
        </div>
    </div>

    <div id="loading" class="fixed inset-0 bg-white/90 backdrop-blur-md z-[300] hidden flex flex-col items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-16 w-16"></div>
        <p class="mt-6 font-bold text-slate-600 uppercase tracking-widest text-xs">Processing...</p>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-2"></div>

    <script>
        // Configuration
        const SUPABASE_URL = 'https://ccvyjwtxbesrvptezeku.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjdnlqd3R4YmVzcnZwdGV6ZWt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjA4NDAsImV4cCI6MjA4OTkzNjg0MH0.gbdAgRrudNU-dhdFVW9TXXxgvZfx5Y2O_gE9X-a38tU';
        
        let supabaseClient;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Supabase failed to initialize", e);
        }

        let currentView = 'home';
        let carouselInterval;

        // Navigation Engine
        function navigate(view) {
            console.log("Navigating to:", view);
            currentView = view;
            const app = document.getElementById('app-view');
            if (!app) return;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            if (carouselInterval) clearInterval(carouselInterval);
            
            switch(view) {
                case 'home': 
                    app.innerHTML = renderHome(); 
                    startCarousel(); 
                    updateTicker(); 
                    break;
                case 'about': app.innerHTML = renderAbout(); break;
                case 'gallery': app.innerHTML = renderGallery(); loadMedia('image'); break;
                case 'videos': app.innerHTML = renderVideos(); loadMedia('video'); break;
                case 'results': app.innerHTML = renderResults(); toggleResultSub('results'); break;
                default: app.innerHTML = renderHome();
            }
        }

        function renderHome() {
            return `
                <section class="relative h-[500px] overflow-hidden bg-slate-950">
                    <div id="carousel-track" class="flex h-full transition-transform duration-1000">
                        <div class="min-w-full h-full relative flex items-center justify-center text-center text-white px-4">
                            <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1920" class="absolute inset-0 w-full h-full object-cover opacity-40">
                            <div class="relative">
                                <h2 class="text-5xl md:text-7xl font-ssf mb-6">Sahithyolsav 2025</h2>
                                <p class="text-lg md:text-xl text-slate-300 max-w-2xl mx-auto">Nilambur Division's Ultimate Literary Festival</p>
                            </div>
                        </div>
                    </div>
                </section>
                <section class="py-20 bg-white text-center">
                    <div class="container mx-auto px-4">
                        <h2 class="text-3xl font-bold mb-4">Welcome to the Cultural Hub</h2>
                        <p class="text-slate-500 max-w-2xl mx-auto">Join us in celebrating literature, art, and the vibrant culture of Nilambur.</p>
                    </div>
                </section>
            `;
        }

        function renderAbout() {
            return `<section class="py-20 container mx-auto px-4">
                <div class="bg-white p-10 rounded-3xl shadow-sm">
                    <h2 class="text-4xl font-ssf text-orange-600 mb-6">About Us</h2>
                    <p class="text-slate-600 leading-relaxed">Sahithyolsav is a premier student festival organized by SSF, designed to nurture moral excellence and intellectual growth through cultural activities.</p>
                </div>
            </section>`;
        }

        function renderResults() {
            return `<section class="py-20 container mx-auto px-4">
                <h2 class="text-4xl font-ssf mb-8">Live Results</h2>
                <div id="result-content" class="bg-white p-6 rounded-3xl shadow-sm min-h-[200px]">Loading...</div>
            </section>`;
        }

        function renderGallery() {
            return `<section class="py-20 container mx-auto px-4">
                <h2 class="text-4xl font-ssf mb-8">Gallery</h2>
                <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </section>`;
        }

        function renderVideos() {
            return `<section class="py-20 container mx-auto px-4">
                <h2 class="text-4xl font-ssf mb-8">Videos</h2>
                <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
            </section>`;
        }

        // Ticker Logic
        async function updateTicker() {
            if (!supabaseClient) return;
            const { data } = await supabaseClient.from('news').select('*').order('created_at', { ascending: false });
            const ticker = document.getElementById('news-ticker');
            if (data && data.length > 0 && ticker) {
                ticker.innerText = data.map(n => n.content).join('   •   ');
            }
        }

        function startCarousel() {
            let i = 0;
            carouselInterval = setInterval(() => {
                const track = document.getElementById('carousel-track');
                if (!track) return;
                i = (i + 1) % 1; // Adjust if you add more slides
                track.style.transform = `translateX(-${i * 100}%)`;
            }, 5000);
        }

        // UI Handlers
        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }
        function openLoginModal() { document.getElementById('login-modal').classList.remove('hidden'); }
        function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log("App Initialized");
            navigate('home');
        });

    </script>
</body>
</html>
