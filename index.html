<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahithyolsav - Nilambur Division</title>
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'CooperBlack';
            src: local('Cooper Black'), local('CooperBlack');
            font-weight: bold;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #f9fafb; scroll-behavior: smooth; }
        .font-ssf { font-family: 'CooperBlack', serif; font-weight: 900; }
        .bg-sahithyolsav { background-color: #f97316; }
        .text-sahithyolsav { color: #f97316; }
        
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 30s linear infinite; }
        .ticker-container:hover .ticker-text { animation-play-state: paused; }

        .scratch-container {
            position: relative; width: 100px; height: 50px; background: #eee; border-radius: 8px; cursor: pointer;
            overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: bold;
            border: 2px solid #ddd; transition: all 0.3s;
        }
        .scratch-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #f97316, #ea580c); z-index: 10;
            display: flex; align-items: center; justify-content: center; color: white;
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
        }
        .scratched .scratch-overlay { opacity: 0; pointer-events: none; transform: scale(1.2); transition: 0.4s ease-in-out; }
        .scratched { border-color: #f97316; background: #fff7ed; box-shadow: 0 0 15px rgba(249, 115, 22, 0.2); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="Sahithyolsav (en)_1.png" alt="Logo" class="h-12 md:h-16 w-auto object-contain" onerror="this.src='https://placehold.co/150x60?text=Sahithyolsav'">
                <div>
                    <h1 class="font-ssf text-3xl md:text-4xl text-sahithyolsav leading-none">SSF</h1>
                    <p class="text-[10px] md:text-xs font-bold tracking-[0.2em] text-gray-600 uppercase">Nilambur Division</p>
                </div>
            </div>
            <nav class="hidden lg:flex gap-6 font-bold uppercase text-xs tracking-widest">
                <button onclick="navigate('home')" class="hover:text-sahithyolsav transition">Home</button>
                <button onclick="navigate('about')" class="hover:text-sahithyolsav transition">About Us</button>
                <button onclick="navigate('gallery')" class="hover:text-sahithyolsav transition">Gallery</button>
                <button onclick="navigate('videos')" class="hover:text-sahithyolsav transition">Videos</button>
                <button onclick="navigate('results')" class="hover:text-sahithyolsav transition">Results</button>
                <button onclick="openLoginModal()" class="bg-sahithyolsav text-white px-5 py-2 rounded-full shadow hover:bg-orange-600 transition">Login</button>
            </nav>
            <button class="lg:hidden p-2" onclick="toggleMobileMenu()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
        <div id="mobile-menu" class="hidden lg:hidden bg-white border-t shadow-xl font-bold uppercase text-xs">
            <div class="flex flex-col p-4 space-y-4">
                <button onclick="navigate('home'); toggleMobileMenu()" class="py-2 border-b text-left">Home</button>
                <button onclick="navigate('about'); toggleMobileMenu()" class="py-2 border-b text-left">About Us</button>
                <button onclick="navigate('gallery'); toggleMobileMenu()" class="py-2 border-b text-left">Gallery</button>
                <button onclick="navigate('videos'); toggleMobileMenu()" class="py-2 border-b text-left">Videos</button>
                <button onclick="navigate('results'); toggleMobileMenu()" class="py-2 border-b text-left">Results</button>
                <button onclick="openLoginModal(); toggleMobileMenu()" class="py-3 bg-sahithyolsav text-white rounded-lg text-center">Login Portal</button>
            </div>
        </div>
        <div class="bg-black text-white py-1.5 ticker-container overflow-hidden">
            <div class="ticker-text font-bold text-[10px] uppercase tracking-[0.1em]" id="news-ticker">Fetching news...</div>
        </div>
    </header>

    <main id="app-view" class="min-h-screen"></main>

    <footer class="bg-gray-900 text-white py-12 mt-20">
        <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-12">
            <div><h2 class="font-ssf text-3xl text-sahithyolsav mb-4">SSF Nilambur</h2><p class="text-gray-400 text-sm">Sahithyolsav is a cultural movement by SSF Nilambur.</p></div>
            <div><h3 class="font-bold uppercase tracking-widest text-xs mb-6 text-gray-500">Quick Portal</h3><ul class="space-y-3 text-sm font-bold uppercase"><li><button onclick="navigate('results')">Live Results</button></li><li><button onclick="navigate('about')">About Us</button></li></ul></div>
            <div><h3 class="font-bold uppercase tracking-widest text-xs mb-6 text-gray-500">Social Links</h3><div class="flex gap-6"><a href="https://www.facebook.com/share/1FNVLLXMmw/" class="text-xs uppercase font-bold text-gray-400">FB</a><a href="https://www.instagram.com/ssfnilamburdvn/" class="text-xs uppercase font-bold text-gray-400">IG</a></div></div>
        </div>
    </footer>

    <!-- Modals -->
    <div id="login-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full relative">
            <h2 class="text-2xl font-ssf text-center mb-8 text-sahithyolsav">SYSTEM LOGIN</h2>
            <div class="space-y-4">
                <input type="text" id="login-id" placeholder="Login ID" class="w-full border p-3 rounded-xl outline-none"><input type="password" id="login-pwd" placeholder="Password" class="w-full border p-3 rounded-xl outline-none"><button onclick="handleLogin()" class="w-full bg-sahithyolsav text-white py-3 rounded-xl font-bold uppercase">Enter Portal</button>
            </div>
        </div>
    </div>
    <div id="admin-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-lg w-full relative overflow-y-auto max-h-[90vh]"><div id="admin-modal-content"></div></div>
    </div>
    <div id="loading" class="fixed inset-0 bg-white/80 z-[200] hidden flex flex-col items-center justify-center"><div class="animate-spin rounded-full h-12 w-12 border-4 border-sahithyolsav border-t-transparent"></div></div>

    <script>
        const SUPABASE_URL = 'https://ccvyjwtxbesrvptezeku.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjdnlqd3R4YmVzcnZwdGV6ZWt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjA4NDAsImV4cCI6MjA4OTkzNjg0MH0.gbdAgRrudNU-dhdFVW9TXXxgvZfx5Y2O_gE9X-a38tU';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentView = 'home';
        let currentUser = null;

        function navigate(view) {
            currentView = view;
            const app = document.getElementById('app-view');
            if(!app) return;
            window.scrollTo(0,0);
            switch(view) {
                case 'home': app.innerHTML = renderHome(); startCarousel(); updateTicker(); break;
                case 'about': app.innerHTML = renderAbout(); break;
                case 'gallery': app.innerHTML = renderGallery(); loadMedia('image'); break;
                case 'videos': app.innerHTML = renderVideos(); loadMedia('video'); break;
                case 'results': app.innerHTML = renderResults(); toggleResultSub('results'); break;
                case 'admin': app.innerHTML = renderAdmin(); adminSub('programs'); break;
                case 'stage': app.innerHTML = renderStage(); fetchStagePrograms(); break;
            }
        }

        async function handleLogin() {
            const id = document.getElementById('login-id').value;
            const pwd = document.getElementById('login-pwd').value;
            if ((id === 'admin' && pwd === 'nilambur123') || (id === 'sharafunbr@gmail.com' && pwd === '123456')) {
                currentUser = { role: 'admin' }; closeLoginModal(); navigate('admin'); return;
            }
            const { data } = await supabaseClient.from('users_auth').select('*').eq('login_id', id).eq('password', pwd).single();
            if (data) { currentUser = data; closeLoginModal(); navigate('stage'); }
            else showToast("Invalid Credentials", "error");
        }

        function renderHome() {
            return `
                <section class="relative h-[400px] md:h-[600px] bg-gray-200 overflow-hidden">
                    <div id="carousel-track" class="flex h-full transition-transform duration-1000">
                        <div class="min-w-full h-full bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&w=1200')"></div>
                        <div class="min-w-full h-full bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1200')"></div>
                    </div>
                </section>
                <section class="py-16 container mx-auto px-4 text-center">
                    <h2 class="text-4xl font-ssf mb-8 text-sahithyolsav uppercase tracking-tighter">Sahithyolsav Nilambur</h2>
                    <p class="max-w-2xl mx-auto font-bold uppercase text-xs tracking-widest text-gray-500 mb-8">Nurturing creative voices through wisdom and culture.</p>
                    <a href="#" class="bg-black text-white px-10 py-4 rounded-full font-bold uppercase text-[10px] tracking-widest shadow-xl">Download Brochure</a>
                </section>`;
        }

        function renderAbout() { return `<section class="py-20"><div class="container mx-auto px-4 max-w-4xl bg-white p-12 rounded-[2rem] shadow-xl"><h1 class="text-4xl font-ssf text-sahithyolsav mb-8">About Sahithyolsav</h1><p class="font-bold text-gray-600 uppercase text-xs tracking-widest leading-loose">Sahithyolsav is a premier platform for literary and artistic expression conducted by SSF Nilambur Division.</p></div></section>`; }
        function renderResults() { return `<section class="py-12 bg-gray-100 min-h-screen"><div class="container mx-auto px-4"><div class="flex justify-center mb-10"><div class="inline-flex bg-white p-1 rounded-xl shadow"><button onclick="toggleResultSub('results')" class="px-6 py-2 rounded-lg font-bold" id="btn-res-list">Results</button><button onclick="toggleResultSub('status')" class="px-6 py-2 rounded-lg font-bold" id="btn-res-status">Team Status</button></div></div><div id="result-content" class="bg-white rounded-3xl p-8 shadow-xl min-h-[400px]"></div></div></section>`; }
        function renderGallery() { return `<section class="py-20"><div class="container mx-auto px-4"><h1 class="text-4xl font-ssf text-center text-sahithyolsav mb-12">GALLERY</h1><div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div></div></section>`; }
        function renderVideos() { return `<section class="py-20"><div class="container mx-auto px-4"><h1 class="text-4xl font-ssf text-center text-sahithyolsav mb-12">VIDEOS</h1><div id="video-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div></div></section>`; }

        async function loadMedia(type) {
            const { data } = await supabaseClient.from('media').select('*').eq('type', type).order('created_at', { ascending: false });
            const grid = document.getElementById(type === 'image' ? 'gallery-grid' : 'video-grid');
            if (data && grid) grid.innerHTML = data.map(m => type === 'image' ? `<div class="bg-white rounded-xl overflow-hidden shadow"><img src="${m.url}" class="w-full h-48 object-cover"><div class="p-3 text-[10px] font-bold uppercase text-center">${m.title}</div></div>` : `<div class="bg-white rounded-xl overflow-hidden shadow"><iframe class="w-full aspect-video" src="${m.url.replace('watch?v=', 'embed/')}" frameborder="0"></iframe><div class="p-4 font-bold uppercase text-[10px] text-center">${m.title}</div></div>`).join('');
        }

        async function toggleResultSub(sub) {
            const content = document.getElementById('result-content');
            if(!content) return;
            document.getElementById('btn-res-list').className = sub === 'results' ? 'px-6 py-2 rounded-lg font-bold bg-sahithyolsav text-white shadow' : 'px-6 py-2 rounded-lg font-bold hover:bg-gray-50';
            document.getElementById('btn-res-status').className = sub === 'status' ? 'px-6 py-2 rounded-lg font-bold bg-sahithyolsav text-white shadow' : 'px-6 py-2 rounded-lg font-bold hover:bg-gray-50';
            if (sub === 'results') {
                content.innerHTML = `<div class="text-center mb-8"><div class="text-5xl font-ssf text-sahithyolsav" id="published-count">0</div><div class="text-gray-400 font-bold uppercase text-[10px] tracking-widest">Published</div></div><div id="programs-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>`;
                loadPublicResults();
            } else {
                content.innerHTML = `<h2 class="text-2xl font-ssf mb-8 text-center">LIVE POINT TABLE</h2><div id="points-body" class="max-w-md mx-auto space-y-2"></div>`;
                loadTeamStatus();
            }
        }

        async function loadTeamStatus() {
            const { data } = await supabaseClient.from('team_points').select('*').order('points', { ascending: false });
            const body = document.getElementById('points-body');
            if (data && body) body.innerHTML = data.map((d, i) => `<div class="flex justify-between p-4 bg-gray-50 rounded-xl font-bold"><span>#${i+1} ${d.sector}</span><span class="text-sahithyolsav">${d.points}</span></div>`).join('');
        }

        // --- ADMIN FUNCTIONS ---
        function renderAdmin() {
            return `
                <div class="flex flex-col md:flex-row min-h-screen">
                    <aside class="w-full md:w-64 bg-gray-900 text-gray-400 p-8 space-y-6 font-bold uppercase text-[10px] tracking-widest">
                        <h2 class="text-white font-ssf text-2xl mb-8">ADMIN</h2>
                        <button onclick="adminSub('programs')" class="block w-full text-left hover:text-white">Programs</button>
                        <button onclick="adminSub('participants')" class="block w-full text-left hover:text-white">Participants</button>
                        <button onclick="adminSub('news')" class="block w-full text-left hover:text-white">News</button>
                        <button onclick="adminSub('gallery')" class="block w-full text-left hover:text-white">Gallery</button>
                        <button onclick="adminSub('videos')" class="block w-full text-left hover:text-white">Videos</button>
                        <button onclick="adminSub('results')" class="block w-full text-left hover:text-white">Approvals</button>
                        <button onclick="adminSub('users')" class="block w-full text-left hover:text-white">Stage Logins</button>
                        <button onclick="navigate('home')" class="mt-12 text-red-500">Logout</button>
                    </aside>
                    <main class="flex-1 p-8 bg-gray-50" id="admin-content"></main>
                </div>`;
        }

        async function adminSub(view) {
            const main = document.getElementById('admin-content');
            if(!main) return;
            if (view === 'programs') {
                main.innerHTML = `<div class="flex justify-between mb-8"><h2 class="text-2xl font-ssf">PROGRAMS</h2><button onclick="showAddProgramModal()" class="bg-sahithyolsav text-white px-6 py-2 rounded-full font-bold text-[10px]">ADD PROGRAM</button></div><div id="admin-programs-list" class="space-y-2"></div>`;
                fetchAdminPrograms();
            } else if (view === 'gallery' || view === 'videos') {
                const type = view === 'gallery' ? 'image' : 'video';
                main.innerHTML = `<div class="flex justify-between mb-8"><h2 class="text-2xl font-ssf">${view.toUpperCase()}</h2><button onclick="showAddMediaModal('${type}')" class="bg-sahithyolsav text-white px-6 py-2 rounded-full font-bold text-[10px]">ADD ${type.toUpperCase()}</button></div><div id="admin-media-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>`;
                fetchAdminMedia(type);
            } else if (view === 'users') {
                main.innerHTML = `<div class="flex justify-between mb-8"><h2 class="text-2xl font-ssf">STAGE USERS</h2><button onclick="showAddUserModal()" class="bg-sahithyolsav text-white px-6 py-2 rounded-full font-bold text-[10px]">NEW LOGIN</button></div><div id="admin-users-list" class="space-y-2"></div>`;
                fetchAdminUsers();
            } else if (view === 'participants') {
                main.innerHTML = `<h2 class="text-2xl font-ssf mb-8">PARTICIPANTS</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <button onclick="downloadDemoExcel()" class="bg-white p-6 rounded-2xl shadow-sm border font-bold text-xs uppercase text-blue-500">Demo Excel</button>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border text-center"><input type="file" id="excel-file" class="hidden" onchange="processExcel(this)"><label for="excel-file" class="cursor-pointer font-bold text-xs uppercase text-sahithyolsav">Import File</label></div>
                    <button onclick="showAddParticipantModal()" class="bg-white p-6 rounded-2xl shadow-sm border font-bold text-xs uppercase text-green-500">Manual Entry</button></div><div id="admin-participants-list" class="space-y-1"></div>`;
                fetchAdminParticipants();
            } else if (view === 'news') {
                main.innerHTML = `<div class="flex justify-between mb-8"><h2 class="text-2xl font-ssf">NEWS</h2><button onclick="showAddNewsModal()" class="bg-sahithyolsav text-white px-6 py-2 rounded-full font-bold text-[10px]">POST NEWS</button></div><div id="admin-news-list" class="space-y-2"></div>`;
                fetchAdminNews();
            } else if (view === 'results') {
                main.innerHTML = `<h2 class="text-2xl font-ssf mb-8 text-black">APPROVALS</h2><div id="admin-results-approval" class="space-y-4"></div>`;
                fetchAdminResultsApproval();
            }
        }

        // Add User Functions
        async function fetchAdminUsers() {
            const { data } = await supabaseClient.from('users_auth').select('*');
            const list = document.getElementById('admin-users-list');
            if (data && list) list.innerHTML = data.map(u => `<div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm"><span><strong>${u.login_id}</strong> (${u.stage_assigned})</span><button onclick="deleteUser('${u.id}')" class="text-red-500 text-xs font-bold underline">REVOKE</button></div>`).join('');
        }
        function showAddUserModal() {
            const content = document.getElementById('admin-modal-content');
            content.innerHTML = `<h3 class="text-xl font-ssf mb-6">NEW STAGE MANAGER</h3><input type="text" id="nu-id" placeholder="Login ID" class="w-full border p-3 rounded-xl mb-2"><input type="text" id="nu-pwd" placeholder="Password" class="w-full border p-3 rounded-xl mb-2"><select id="nu-stage" class="w-full border p-3 rounded-xl mb-4">${Array.from({length: 13}, (_, i) => `<option value="Stage ${i+1}">Stage ${i+1}</option>`).join('')}</select><button onclick="saveUser()" class="w-full bg-sahithyolsav text-white py-3 rounded-xl font-bold uppercase">Save Credentials</button>`;
            openAdminModal();
        }
        async function saveUser() {
            const id = document.getElementById('nu-id').value; const pwd = document.getElementById('nu-pwd').value; const stage = document.getElementById('nu-stage').value;
            if(!id || !pwd) return; await supabaseClient.from('users_auth').insert({ login_id: id, password: pwd, role: 'stage', stage_assigned: stage });
            closeAdminModal(); adminSub('users');
        }
        async function deleteUser(id) { if(confirm("Revoke Access?")) { await supabaseClient.from('users_auth').delete().eq('id', id); adminSub('users'); } }

        // Media Management Functions
        async function fetchAdminMedia(type) {
            const { data } = await supabaseClient.from('media').select('*').eq('type', type);
            const list = document.getElementById('admin-media-list');
            if (data && list) list.innerHTML = data.map(m => `<div class="bg-white p-2 rounded shadow border text-center">${type==='image' ? `<img src="${m.url}" class="h-20 w-full object-cover mb-2">` : `<div class="h-20 bg-gray-100 mb-2 flex items-center justify-center text-[8px]">VIDEO</div>`}<div class="text-[8px] truncate font-bold uppercase">${m.title}</div><button onclick="deleteMedia('${m.id}', '${type}')" class="text-red-500 text-[8px] font-bold">REMOVE</button></div>`).join('');
        }
        function showAddMediaModal(type) {
            const content = document.getElementById('admin-modal-content');
            content.innerHTML = `<h3 class="text-xl font-ssf mb-6 uppercase">ADD ${type}</h3><input type="text" id="m-title" placeholder="Title" class="w-full border p-3 rounded-xl mb-2"><input type="text" id="m-url" placeholder="URL Link" class="w-full border p-3 rounded-xl mb-4"><button onclick="saveMedia('${type}')" class="w-full bg-sahithyolsav text-white py-3 rounded-xl font-bold uppercase">Add Entry</button>`;
            openAdminModal();
        }
        async function saveMedia(type) {
            const t = document.getElementById('m-title').value; const u = document.getElementById('m-url').value; if(!u) return;
            await supabaseClient.from('media').insert({ title: t, url: u, type }); closeAdminModal(); adminSub(type==='image' ? 'gallery' : 'videos');
        }
        async function deleteMedia(id, type) { await supabaseClient.from('media').delete().eq('id', id); adminSub(type==='image' ? 'gallery' : 'videos'); }

        // Program and Participant Functions
        async function fetchAdminPrograms() {
            const { data } = await supabaseClient.from('programs').select('*').order('date_time', { ascending: false });
            const list = document.getElementById('admin-programs-list');
            if (data && list) list.innerHTML = data.map(p => `<div class="bg-white p-5 rounded-2xl border flex justify-between items-center shadow-sm"><div><div class="font-ssf text-lg uppercase">${p.name}</div><div class="text-[9px] font-bold uppercase tracking-widest text-sahithyolsav">${p.category} | ${p.stage_id}</div></div><div class="flex gap-4"><button onclick="viewProgramLiveSync('${p.id}')" class="text-blue-500 font-bold text-[10px] underline uppercase">Live Sync</button><button onclick="deleteProgram('${p.id}')" class="text-red-500 font-bold text-[10px] underline uppercase">Delete</button></div></div>`).join('');
        }
        function showAddProgramModal() {
            const cats = ['Lower Primary', 'Upper Primary', 'High School', 'Higher Secondary', 'Junior', 'Senior', 'General', 'Campus', 'Campus Girls Parallel'];
            const content = document.getElementById('admin-modal-content');
            content.innerHTML = `<h3 class="text-xl font-ssf mb-6">ADD PROGRAM</h3><input type="text" id="p-name" placeholder="Name" class="w-full border p-3 rounded-xl mb-2"><select id="p-cat" class="w-full border p-3 rounded-xl mb-2">${cats.map(c => `<option value="${c}">${c}</option>`).join('')}</select><select id="p-stage" class="w-full border p-3 rounded-xl mb-4">${Array.from({length: 13}, (_, i) => `<option value="Stage ${i+1}">Stage ${i+1}</option>`).join('')}</select><button onclick="saveProgram()" class="w-full bg-sahithyolsav text-white py-3 rounded-xl font-bold uppercase">Save Program</button>`;
            openAdminModal();
        }
        async function saveProgram() { const n = document.getElementById('p-name').value; const c = document.getElementById('p-cat').value; const s = document.getElementById('p-stage').value; if(!n) return; await supabaseClient.from('programs').insert({ name: n, category: c, stage_id: s }); closeAdminModal(); adminSub('programs'); }
        async function deleteProgram(id) { if(confirm("Permanently Delete?")) { await supabaseClient.from('programs').delete().eq('id', id); adminSub('programs'); } }

        // --- STAGE PORTAL LOGIC ---
        function renderStage() { return `<div class="container mx-auto px-4 py-16 max-w-5xl"><h2 class="text-3xl font-ssf text-sahithyolsav mb-10 uppercase">PORTAL: ${currentUser?.stage_assigned || 'Manager'}</h2><div id="stage-programs-list" class="grid gap-4"></div></div>`; }
        async function fetchStagePrograms() {
            showLoading(true); const { data } = await supabaseClient.from('programs').select('*').eq('stage_id', currentUser.stage_assigned).order('date_time', { ascending: true }); showLoading(false);
            const list = document.getElementById('stage-programs-list');
            if (data && list) list.innerHTML = data.map(p => `<div onclick="openStageProgram('${p.id}')" class="bg-white p-6 rounded-2xl border shadow-sm cursor-pointer flex justify-between items-center group transition"><div><div class="font-ssf text-xl uppercase group-hover:text-sahithyolsav">${p.name}</div><div class="text-[9px] font-bold uppercase text-gray-400 mt-1">${p.category}</div></div><span class="text-[9px] font-bold uppercase px-3 py-1 bg-gray-100 rounded-full">${p.status}</span></div>`).join('');
        }

        async function openStageProgram(id) {
            showLoading(true); const { data: prog } = await supabaseClient.from('programs').select('*').eq('id', id).single(); const { data: parts } = await supabaseClient.from('participants').select('*').eq('program_id', id).order('chess_number', { ascending: true }); showLoading(false);
            if (!prog) return showToast("Program not accessible", "error");
            
            const main = document.getElementById('app-view');
            const hasStartedReveal = parts.some(p => p.chess_number);
            const presentParts = parts.filter(p => p.attendance);
            const allPresentRevealed = presentParts.length > 0 && presentParts.every(p => p.chess_number);

            main.innerHTML = `
                <div class="container mx-auto px-4 py-12 max-w-6xl">
                    <button onclick="navigate('stage')" class="mb-8 font-bold text-sahithyolsav flex items-center gap-2 uppercase text-[10px] tracking-widest">← Back</button>
                    <div class="bg-white rounded-3xl p-8 shadow-xl mb-12 flex justify-between items-center border-t-8 border-sahithyolsav">
                        <div><h1 class="text-3xl font-ssf uppercase">${prog.name}</h1><p class="text-[9px] font-bold uppercase text-gray-400 mt-1">${prog.category} | ${prog.stage_id}</p></div>
                        <div class="flex gap-2">
                            ${!hasStartedReveal ? `<button onclick="startProgramReveal('${prog.id}')" class="bg-black text-white px-6 py-2 rounded-full font-bold uppercase text-[9px] tracking-widest">Start Randomized Reveal</button>` : ''}
                            <button onclick="finishStageProgram('${prog.id}')" class="bg-green-600 text-white px-6 py-2 rounded-full font-bold uppercase text-[9px] tracking-widest">Submit Results</button>
                        </div>
                    </div>
                    <div class="grid gap-4">
                        ${parts.map(p => {
                            const privacyOn = allPresentRevealed && p.attendance;
                            return `
                            <div class="bg-white rounded-2xl shadow-md border p-6 flex flex-col lg:flex-row items-center gap-6 ${!p.attendance && hasStartedReveal ? 'opacity-20' : ''}">
                                ${!privacyOn ? `<div class="w-full lg:w-1/4"><div class="text-[9px] font-bold text-gray-400 uppercase">ID: ${p.participation_number}</div><div class="text-xl font-bold uppercase">${p.name}</div><div class="text-[10px] font-bold text-sahithyolsav uppercase tracking-widest mt-1">${p.sector}</div></div>` : `<div class="w-full lg:w-1/4 flex items-center gap-4"><div class="text-6xl font-ssf text-sahithyolsav">${p.chess_number}</div><div class="text-[9px] font-bold text-gray-400 uppercase leading-none">UNIT<br>ID</div></div>`}
                                <div class="w-full lg:w-1/4 flex flex-col items-center ${!privacyOn ? 'border-x px-4' : ''}">
                                    ${!hasStartedReveal ? `<div class="flex items-center gap-2 mb-2"><input type="checkbox" ${p.attendance ? 'checked' : ''} onchange="markAttendance('${p.id}', this.checked)" class="w-6 h-6 accent-sahithyolsav cursor-pointer"><span class="text-xs font-bold uppercase tracking-widest">Present</span></div>` : ''}
                                    ${p.attendance ? `<div id="scratch-${p.id}" class="scratch-container ${p.chess_number ? 'scratched' : ''}" onclick="revealParticipantChess('${p.id}', '${id}')"><div class="scratch-overlay">REVEAL</div><span class="text-3xl font-ssf text-sahithyolsav">${p.chess_number || '?'}</span></div>` : `<div class="text-xs text-gray-300 font-bold">ABSENT</div>`}
                                </div>
                                ${p.attendance ? `<div class="w-full lg:w-2/4 grid grid-cols-2 gap-4"><div class="relative"><label class="text-[8px] font-bold text-gray-400 absolute top-1 left-3 uppercase">Score</label><input type="number" id="score-${p.id}" value="${p.score || ''}" class="w-full border pt-5 pb-1 px-3 rounded-xl font-bold"></div><div class="relative"><label class="text-[8px] font-bold text-gray-400 absolute top-1 left-3 uppercase">Feedback</label><input type="text" id="fb-${p.id}" value="${p.feedback || ''}" class="w-full border pt-5 pb-1 px-3 rounded-xl text-xs"></div><button onclick="updateEntry('${p.id}', '${id}')" class="col-span-2 bg-sahithyolsav text-white py-2 rounded-xl font-bold text-[9px] uppercase tracking-widest">Update Admin</button></div>` : ''}
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        async function startProgramReveal(progId) {
            const { data: pts } = await supabaseClient.from('participants').select('*').eq('program_id', progId).eq('attendance', true);
            if(!pts.length) return showToast("No present participants", "error");
            let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").slice(0, pts.length).sort(() => Math.random() - 0.5);
            showLoading(true); for (let i = 0; i < pts.length; i++) await supabaseClient.from('participants').update({ chess_number: letters[i] }).eq('id', pts[i].id); showLoading(false);
            openStageProgram(progId);
        }
        async function revealParticipantChess(pId, progId) { document.getElementById(`scratch-${pId}`)?.classList.add('scratched'); setTimeout(() => openStageProgram(progId), 800); }
        async function updateEntry(pId, prId) { const s = document.getElementById(`score-${pId}`).value; const f = document.getElementById(`fb-${pId}`).value; showLoading(true); await supabaseClient.from('participants').update({ score: s || 0, feedback: f }).eq('id', pId); showLoading(false); showToast("Admin Updated", "success"); }
        async function finishStageProgram(id) { if(confirm("Submit Results?")) { await supabaseClient.from('programs').update({ status: 'completed' }).eq('id', id); navigate('stage'); } }
        async function markAttendance(id, present) { await supabaseClient.from('participants').update({ attendance: present }).eq('id', id); }

        // --- COMMON UTILS ---
        function showLoading(s) { document.getElementById('loading')?.classList.toggle('hidden', !s); }
        function showToast(m, t) { const toast = document.createElement('div'); toast.className = `fixed bottom-8 right-8 ${t === 'error' ? 'bg-red-600' : 'bg-green-600'} text-white px-8 py-4 rounded-2xl shadow-2xl z-[500] font-bold text-[10px] uppercase tracking-widest animate-bounce`; toast.innerText = m; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
        function updateTicker() { supabaseClient.from('news').select('*').order('created_at', { ascending: false }).then(({data}) => { const t = document.getElementById('news-ticker'); if(t) t.innerText = (data && data.length > 0) ? data.map(n => n.content).join('  |  ') : "Sahithyolsav 2025 Nilambur Division"; }); }
        function startCarousel() { let i = 0; setInterval(() => { i = (i + 1) % 2; const t = document.getElementById('carousel-track'); if(t) t.style.transform = `translateX(-${i * 100}%)`; }, 5000); }
        window.onload = () => navigate('home');

        async function loadPublicResults() {
            const { data } = await supabaseClient.from('programs').select('*').eq('results_published', true);
            const grid = document.getElementById('programs-grid');
            if (data && grid) {
                const count = document.getElementById('published-count'); if(count) count.innerText = data.length;
                grid.innerHTML = data.map(p => `<div onclick="showProgramResult('${p.id}')" class="bg-gray-50 p-6 rounded-2xl border-2 hover:border-sahithyolsav cursor-pointer font-bold flex justify-between items-center group transition shadow-sm"><span>${p.name} <small class="text-gray-400 font-normal ml-2 tracking-widest uppercase text-[8px]">(${p.category})</small></span><svg class="w-4 h-4 text-sahithyolsav" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg></div>`).join('');
            }
        }

        async function showProgramResult(progId) {
            const { data: parts } = await supabaseClient.from('participants').select('*').eq('program_id', progId).order('score', { ascending: false });
            if (!parts) return; const winners = parts.slice(0, 3);
            const modal = document.createElement('div'); modal.className = "fixed inset-0 bg-black/90 backdrop-blur z-[300] flex items-center justify-center p-4 overflow-y-auto";
            modal.innerHTML = `<div class="max-w-4xl w-full"><div class="flex justify-between items-center text-white mb-8"><div><h2 class="text-3xl font-ssf uppercase">WINNERS PORTAL</h2></div><button onclick="this.closest('.fixed').remove()" class="bg-white/10 px-4 py-2 rounded-full text-xs font-bold">CLOSE</button></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div id="pd-1" class="aspect-[3/4] bg-sahithyolsav p-10 flex flex-col justify-between border-[10px] border-white text-center text-white">
                        <h3 class="font-ssf text-xl uppercase border-b border-white pb-3">Sahithyolsav 2025</h3>
                        <div class="my-auto"><div class="text-[8px] font-bold uppercase tracking-widest mb-4">First Place</div><div class="text-4xl font-ssf uppercase leading-tight mb-2">${winners[0]?.name || '---'}</div><div class="text-[10px] font-black uppercase border-t border-white/20 pt-4 tracking-widest">${winners[0]?.sector || '---'}</div></div>
                        <div class="text-[8px] uppercase tracking-widest font-bold">SSF Nilambur</div>
                    </div>
                </div>
                <div class="flex justify-center"><button onclick="html2canvas(document.getElementById('pd-1')).then(c => { let l=document.createElement('a');l.download='Result.png';l.href=c.toDataURL();l.click(); })" class="bg-sahithyolsav text-white px-8 py-3 rounded-full font-bold uppercase text-[10px] tracking-widest">Download Result Poster</button></div></div>`;
            document.body.appendChild(modal);
        }

        // News Logic
        async function fetchAdminNews() {
            const { data } = await supabaseClient.from('news').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('admin-news-list');
            if (data && list) list.innerHTML = data.map(n => `<div class="bg-white p-4 rounded-xl border flex justify-between shadow-sm"><span>${n.content}</span><button onclick="deleteNews('${n.id}')" class="text-red-500 font-bold text-xs">DELETE</button></div>`).join('');
        }
        function showAddNewsModal() {
            const content = document.getElementById('admin-modal-content');
            content.innerHTML = `<h3 class="text-xl font-ssf mb-6">POST NEWS</h3><textarea id="n-txt" class="w-full border p-3 rounded-xl mb-4 h-24"></textarea><button onclick="saveNews()" class="w-full bg-sahithyolsav text-white py-3 rounded-xl font-bold uppercase">Post Announcement</button>`;
            openAdminModal();
        }
        async function saveNews() { const c = document.getElementById('n-txt').value; await supabaseClient.from('news').insert({ content: c }); closeAdminModal(); adminSub('news'); }
        async function deleteNews(id) { await supabaseClient.from('news').delete().eq('id', id); adminSub('news'); }

        // Participant Logic
        function downloadDemoExcel() { const data = [{ ProgramName: "Elocution", Category: "Senior", Name: "Muhammed", Sector: "Nilambur", ParticipationNumber: "101" }]; const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Participants"); XLSX.writeFile(wb, "demo_template.xlsx"); }
        async function fetchAdminParticipants() {
            const { data } = await supabaseClient.from('participants').select('*, programs(name, category)').order('name', { ascending: true }).limit(50);
            const list = document.getElementById('admin-participants-list');
            if (data && list) list.innerHTML = data.map(p => `<div class="flex justify-between items-center p-4 border-b bg-white"><div><div class="font-bold text-sm uppercase">${p.name} <span class="text-sahithyolsav">#${p.participation_number}</span></div><div class="text-[9px] uppercase font-bold text-gray-400">${p.programs?.name || 'No Program'} | ${p.sector}</div></div><button onclick="deleteParticipant('${p.id}')" class="text-red-500 text-[10px] font-bold">REMOVE</button></div>`).join('');
        }
        async function deleteParticipant(id) { if(confirm("Remove participant?")) { await supabaseClient.from('participants').delete().eq('id', id); fetchAdminParticipants(); } }
        async function showAddParticipantModal() {
            const { data: prgs } = await supabaseClient.from('programs').select('*');
            const content = document.getElementById('admin-modal-content');
            content.innerHTML = `<h3 class="text-xl font-ssf mb-6 uppercase text-center">MANUAL ENTRY</h3><div class="space-y-4">
                <input type="text" id="pm-n" placeholder="Name" class="w-full border p-2 rounded">
                <input type="text" id="pm-no" placeholder="Number" class="w-full border p-2 rounded">
                <input type="text" id="pm-s" placeholder="Sector" class="w-full border p-2 rounded">
                <select id="pm-p" class="w-full border p-2 rounded">${prgs.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select>
                <button onclick="saveManualParticipant()" class="w-full bg-sahithyolsav text-white py-3 rounded-xl font-bold uppercase">Save</button></div>`;
            openAdminModal();
        }
        async function saveManualParticipant() {
            const n = document.getElementById('pm-n').value; const no = document.getElementById('pm-no').value; const s = document.getElementById('pm-s').value; const p = document.getElementById('pm-p').value;
            if(!n || !no) return; await supabaseClient.from('participants').insert({ name: n, participation_number: no, sector: s, program_id: p });
            closeAdminModal(); adminSub('participants');
        }

        async function processExcel(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader(); reader.onload = async (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                showLoading(true); for (let row of jsonData) {
                    let { data: prog } = await supabaseClient.from('programs').select('id').eq('name', row.ProgramName || row.Program).single();
                    if (!prog) { const { data: newP } = await supabaseClient.from('programs').insert({ name: row.ProgramName || row.Program, category: row.Category || 'General', stage_id: 'Stage 1' }).select().single(); prog = newP; }
                    await supabaseClient.from('participants').insert({ program_id: prog.id, participation_number: String(row.ParticipationNumber || row['Participation#']), name: row.Name, sector: row.Sector });
                }
                showLoading(false); showToast("Import Finished", "success"); adminSub('participants');
            }; reader.readAsArrayBuffer(file);
        }

        async function fetchAdminResultsApproval() {
            const { data } = await supabaseClient.from('programs').select('*').eq('status', 'completed').eq('results_published', false);
            const list = document.getElementById('admin-results-approval');
            if (data && list) list.innerHTML = data.length === 0 ? `<div class="p-8 text-center text-gray-300 font-bold italic text-xs uppercase tracking-widest">Queue Clear</div>` : data.map(p => `<div class="bg-white p-6 rounded-2xl border flex justify-between shadow-sm"><div><div class="font-bold text-sm uppercase">${p.name}</div><div class="text-[9px] uppercase font-bold text-sahithyolsav">${p.category}</div></div><button onclick="publishPublicResult('${p.id}')" class="bg-green-600 text-white px-6 py-2 rounded-full font-bold text-[9px] uppercase shadow tracking-widest">Approve & Live Publish</button></div>`).join('');
        }
        async function publishPublicResult(id) { await supabaseClient.from('programs').update({ results_published: true }).eq('id', id); showToast("Results Published", "success"); fetchAdminResultsApproval(); }
    </script>
</body>
</html>
