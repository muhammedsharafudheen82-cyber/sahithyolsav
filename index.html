<!DOCTYPE html>

    <style>
        @font-face {
            font-family: 'CooperBlack';
            src: local('Cooper Black'), local('CooperBlack');
            font-weight: bold;
        }
        .font-ssf { font-family: 'CooperBlack', serif; font-weight: 900; }
        .bg-sahithyolsav { background-color: #f97316; }
        .text-sahithyolsav { color: #f97316; }
        
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 30s linear infinite;
        }
        .ticker-container:hover .ticker-text {
            animation-play-state: paused;
        }

        .scratch-container {
            position: relative;
            width: 100px;
            height: 50px;
            background: #eee;
            border-radius: 8px;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid #ddd;
            transition: all 0.3s;
        }
        .scratch-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #f97316, #ea580c);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .scratched .scratch-overlay { opacity: 0; pointer-events: none; transform: scale(1.2); transition: 0.4s ease-in-out; }
        .scratched { border-color: #f97316; background: #fff7ed; box-shadow: 0 0 15px rgba(249, 115, 22, 0.2); }

        .poster-card {
            width: 400px;
            height: 560px;
            padding: 40px;
            position: relative;
            color: white;
            text-align: center;
        }
    </style>
</head>

    <script>
        const SUPABASE_URL = 'https://ccvyjwtxbesrvptezeku.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjdnlqd3R4YmVzcnZwdGV6ZWt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjA4NDAsImV4cCI6MjA4OTkzNjg0MH0.gbdAgRrudNU-dhdFVW9TXXxgvZfx5Y2O_gE9X-a38tU';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentView = 'home';
        let currentUser = null;

        function navigate(view) {
            currentView = view;
            const app = document.getElementById('app-view');
            window.scrollTo(0,0);
            
            switch(view) {
                case 'home': app.innerHTML = renderHome(); startCarousel(); updateTicker(); break;
                case 'about': app.innerHTML = renderAbout(); break;
                case 'gallery': app.innerHTML = renderGallery(); loadMedia('image'); break;
                case 'videos': app.innerHTML = renderVideos(); loadMedia('video'); break;
                case 'results': app.innerHTML = renderResults(); toggleResultSub('results'); break;
                case 'admin': app.innerHTML = renderAdmin(); adminSub('programs'); break;
                case 'stage': app.innerHTML = renderStage(); fetchStagePrograms(); break;
            }
        }

        async function updateTicker() {
            const { data } = await supabaseClient.from('news').select('*').order('created_at', { ascending: false });
            const ticker = document.getElementById('news-ticker');
            if (data && data.length > 0) {
                ticker.innerText = data.map(n => n.content).join('  |  ');
            } else {
                ticker.innerText = "Welcome to Sahithyolsav 2025 Nilambur Division! Stay tuned for updates.";
            }
        }

        function toggleMobileMenu() { document.getElementById('mobile-menu')?.classList.toggle('hidden'); }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }
        function openAdminModal() { document.getElementById('admin-modal').classList.remove('hidden'); }

        function renderHome() {
            return `
                <section class="relative h-[400px] md:h-[600px] bg-gray-200 overflow-hidden">
                    <div id="carousel-track" class="flex h-full transition-transform duration-700">
                        <div class="min-w-full h-full bg-cover bg-center flex items-center justify-center" style="background-image: url('https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&w=1200')">
                            <div class="bg-black bg-opacity-40 p-8 rounded text-white text-center">

                        </div>

        }

        function renderAbout() {
            return `<section class="py-20 bg-orange-50 min-h-screen">
                <div class="container mx-auto px-4 max-w-4xl bg-white p-12 rounded-3xl shadow-xl">
                    <h1 class="text-4xl font-ssf text-sahithyolsav mb-8">About Sahithyolsav</h1>
                    <p class="text-gray-700 leading-relaxed">The Sunni Students’ Federation (SSF) conducts Sahithyolsav as a platform for students to explore and exhibit their literary and artistic talents. Our goal is to promote cultural values and creative thinking.</p>

        }

        function renderResults() {
            return `<section class="py-12 bg-gray-100 min-h-screen">
                <div class="container mx-auto px-4">
                    <div class="flex justify-center mb-10">
                        <div class="inline-flex bg-white p-1 rounded-xl shadow-md">

                        </div>
                    </div>
                    <div id="result-content" class="bg-white rounded-2xl p-6 shadow-lg min-h-[500px]"></div>
                </div></section>`;
        }

        function renderGallery() { 
            return `<section class="py-20">
                <div class="container mx-auto px-4">
                    <h1 class="text-4xl font-ssf text-center text-sahithyolsav mb-12">Photo Gallery</h1>
                    <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
                </div>
            </section>`; 
        }

        function renderVideos() { 
            return `<section class="py-20">
                <div class="container mx-auto px-4">
                    <h1 class="text-4xl font-ssf text-center text-sahithyolsav mb-12">Video Gallery</h1>
                    <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
                </div>
            </section>`; 
        }

        async function loadMedia(type) {
            const { data } = await supabaseClient.from('media').select('*').eq('type', type).order('created_at', { ascending: false });
            const gridId = type === 'image' ? 'gallery-grid' : 'video-grid';
            const grid = document.getElementById(gridId);
            if (!data || !grid) return;

            if (type === 'image') {
                grid.innerHTML = data.map(m => `
                    <div class="bg-white rounded-xl overflow-hidden shadow-lg border border-gray-100 hover:scale-105 transition-transform">
                        <img src="${m.url}" class="w-full h-48 object-cover" alt="${m.title}">
                        <div class="p-3 text-center font-bold text-sm">${m.title || ''}</div>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = data.map(m => `
                    <div class="bg-white rounded-xl overflow-hidden shadow-lg border border-gray-100">
                        <div class="relative pt-[56.25%]">
                            <iframe class="absolute inset-0 w-full h-full" src="${m.url.replace('watch?v=', 'embed/')}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="p-4 text-center font-bold">${m.title || ''}</div>
                    </div>
                `).join('');
            }
        }

        async function toggleResultSub(sub) {
            const content = document.getElementById('result-content');
            if (!content) return;
            document.getElementById('btn-res-list').className = sub === 'results' ? 'px-6 py-2 rounded-lg font-bold bg-sahithyolsav text-white' : 'px-6 py-2 rounded-lg font-bold hover:bg-gray-100';
            document.getElementById('btn-res-status').className = sub === 'status' ? 'px-6 py-2 rounded-lg font-bold bg-sahithyolsav text-white' : 'px-6 py-2 rounded-lg font-bold hover:bg-gray-100';
            if (sub === 'results') {
                content.innerHTML = `<div class="text-center mb-8"><div class="text-4xl font-bold text-sahithyolsav" id="published-count">0</div><div class="text-gray-500 font-bold uppercase text-xs">Published Results</div></div><div id="programs-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>`;
                loadPublicResults();
            } else {
                content.innerHTML = `<h2 class="text-2xl font-bold mb-6 text-center">Live Point Table</h2><div id="points-body" class="space-y-2"></div>`;
                loadTeamStatus();
            }
        }

        async function loadTeamStatus() {
            const { data } = await supabaseClient.from('team_points').select('*').order('points', { ascending: false });
            const body = document.getElementById('points-body');
            if (data && body) body.innerHTML = data.map((d, i) => `<div class="flex justify-between p-4 bg-gray-50 rounded-xl"><span>#${i+1} ${d.sector}</span><span class="font-bold text-sahithyolsav">${d.points}</span></div>`).join('');
        }

        async function handleLogin() {
            const id = document.getElementById('login-id').value;
            const pwd = document.getElementById('login-pwd').value;
            if ((id === 'admin' && pwd === 'nilambur123') || (id === 'sharafunbr@gmail.com' && pwd === '123456')) {
                currentUser = { role: 'admin' }; closeLoginModal(); navigate('admin'); return;
            }
            const { data } = await supabaseClient.from('users_auth').select('*').eq('login_id', id).eq('password', pwd).single();

        function renderAdmin() {
            return `<div class="flex">
                <aside class="w-64 bg-gray-900 min-h-screen text-gray-300 p-6 hidden md:block">
                    <h2 class="text-white font-bold mb-8 text-xl font-ssf">Admin Panel</h2>

                        <button onclick="adminSub('participants')" class="block w-full text-left hover:text-white">Participants</button>

                        <button onclick="adminSub('results')" class="block w-full text-left hover:text-white">Approve Results</button>

                    </nav>
                </aside>

            if (view === 'programs') {
                main.innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Manage Programs</h2><button onclick="showAddProgramModal()" class="bg-sahithyolsav text-white px-4 py-2 rounded-lg font-bold">Add Program</button></div><div id="admin-programs-list" class="space-y-2"></div>`;
                fetchAdminPrograms();
            } else if (view === 'participants') {
                main.innerHTML = `<h2 class="text-2xl font-bold mb-6">Manage Participants</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border text-center">
                            <button onclick="downloadDemoExcel()" class="text-blue-600 font-bold underline">Download Demo Excel</button>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border text-center">
                            <input type="file" id="excel-file" class="hidden" onchange="processExcel(this)">
                            <label for="excel-file" class="cursor-pointer font-bold text-sahithyolsav">Import XLSX File</label>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border text-center">
                            <button onclick="showAddParticipantModal()" class="font-bold text-green-600">Manual Entry</button>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <div class="flex gap-2 mb-6">
                            <input type="text" id="p-search" placeholder="Search by name or number..." class="flex-1 border p-2 rounded outline-none focus:ring-1 focus:ring-sahithyolsav">
                            <button onclick="fetchAdminParticipants()" class="bg-gray-800 text-white px-6 py-2 rounded-lg font-bold">Filter List</button>
                        </div>
                        <div id="admin-participants-list" class="space-y-1"></div>
                    </div>`;
                fetchAdminParticipants();
            } else if (view === 'news') {
                main.innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">News & Announcements</h2><button onclick="showAddNewsModal()" class="bg-sahithyolsav text-white px-4 py-2 rounded-lg font-bold">Add News</button></div><div id="admin-news-list" class="space-y-2"></div>`;
                fetchAdminNews();

                main.innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Gallery Images</h2><button onclick="showAddMediaModal('image')" class="bg-sahithyolsav text-white px-4 py-2 rounded-lg font-bold">Add Image</button></div><div id="admin-gallery-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>`;
                fetchAdminMedia('image');
            } else if (view === 'videos') {
                main.innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Video Management</h2><button onclick="showAddMediaModal('video')" class="bg-sahithyolsav text-white px-4 py-2 rounded-lg font-bold">Add Video Link</button></div><div id="admin-video-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>`;
                fetchAdminMedia('video');
            } else if (view === 'results') {
                main.innerHTML = `<h2 class="text-2xl font-bold mb-6">Approval Queue</h2><div id="admin-results-approval" class="space-y-4"></div>`;
                fetchAdminResultsApproval();
            } else if (view === 'users') {
                main.innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Stage Managers</h2><button onclick="showAddUserModal()" class="bg-sahithyolsav text-white px-4 py-2 rounded-lg font-bold">Add Manager</button></div><div id="admin-users-list" class="space-y-2"></div>`;
                loadAdminUsers();
            }

        // Previous Admin features (kept intact)
        async function fetchAdminNews() {
            const { data } = await supabaseClient.from('news').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('admin-news-list');
            if (data && list) list.innerHTML = data.map(n => `<div class="bg-white p-4 rounded-xl border flex justify-between items-center"><span class="text-sm font-bold">${n.content}</span><button onclick="deleteNews('${n.id}')" class="text-red-500 font-bold p-2">Delete</button></div>`).join('');
        }
        function showAddNewsModal() {
            const content = document.getElementById('admin-modal-content');
            content.innerHTML = `<h3 class="text-xl font-bold mb-4 font-ssf">Add Announcement</h3><textarea id="news-content" class="w-full border p-2 rounded mb-4 h-24"></textarea><button onclick="saveNews()" class="w-full bg-sahithyolsav text-white py-2 rounded-lg font-bold">Post News</button>`;
            openAdminModal();
        }
        async function saveNews() { const c = document.getElementById('news-content').value; if(!c) return; await supabaseClient.from('news').insert({ content: c }); closeAdminModal(); adminSub('news'); }
        async function deleteNews(id) { await supabaseClient.from('news').delete().eq('id', id); adminSub('news'); }

        async function fetchAdminMedia(type) {

        async function addParticipantManual() {
            const name = document.getElementById('p-name').value;
            const participation_number = document.getElementById('p-no').value;
            const sector = document.getElementById('p-sector').value;
            const program_id = document.getElementById('p-prog').value;

            showLoading(true);

        async function fetchAdminParticipants() {
            const search = document.getElementById('p-search')?.value || '';
            const { data } = await supabaseClient.from('participants').select('*, programs(name, category)').order('name', { ascending: true }).limit(100);
            const list = document.getElementById('admin-participants-list');
            if (!list) return;
            const filtered = search ? data.filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.participation_number.toLowerCase().includes(search.toLowerCase())) : data;
            list.innerHTML = filtered.map(p => `<div class="flex justify-between items-center p-3 border-b bg-white"><div><div class="font-bold text-sm">${p.name} <span class="text-sahithyolsav">#${p.participation_number}</span></div><div class="text-[10px] text-gray-500 uppercase font-bold">${p.programs?.name || ''} | ${p.sector}</div></div><button onclick="deleteParticipant('${p.id}')" class="text-xs text-red-500 font-bold">Delete</button></div>`).join('');

        async function deleteParticipant(id) { if(confirm("Delete this participant?")) { await supabaseClient.from('participants').delete().eq('id', id); fetchAdminParticipants(); } }

        // --- STAGE PORTAL UPDATES ---
        function renderStage() {
            return `<div class="container mx-auto px-4 py-12 max-w-5xl">
                <h2 class="text-3xl font-ssf text-sahithyolsav mb-8">Stage Manager: ${currentUser?.stage_assigned || 'Master'}</h2>
                <div id="stage-programs-list" class="grid gap-4"></div>
            </div>`;
        }

        async function fetchStagePrograms() {
            const { data } = await supabaseClient.from('programs').select('*').eq('stage_id', currentUser.stage_assigned);
            const list = document.getElementById('stage-programs-list');
            if (data && list) list.innerHTML = data.map(p => `
                <div onclick="openStageProgram('${p.id}')" class="bg-white p-6 rounded-2xl shadow-sm border hover:border-sahithyolsav cursor-pointer flex justify-between items-center transition">
                    <div><div class="font-bold text-lg">${p.name}</div><div class="text-xs text-gray-500 uppercase font-bold">${p.category}</div></div>
                    <span class="text-xs font-bold uppercase px-3 py-1 bg-gray-100 rounded-full">${p.status}</span>
                </div>`).join('');
        }

        async function openStageProgram(id) {
            const { data: prog } = await supabaseClient.from('programs').select('*').eq('id', id).single();
            const { data: parts } = await supabaseClient.from('participants').select('*').eq('program_id', id).order('chess_number', { ascending: true });
            
            const main = document.getElementById('app-view');
            const hasStartedReveal = parts.some(p => p.chess_number);
            const presentParts = parts.filter(p => p.attendance);
            const allPresentScratched = presentParts.length > 0 && presentParts.every(p => p.chess_number);

            main.innerHTML = `
                <div class="container mx-auto px-4 py-8 max-w-6xl">
                    <button onclick="navigate('stage')" class="mb-6 font-bold text-sahithyolsav flex items-center gap-2">← Back to Portal</button>
                    <div class="bg-white rounded-3xl p-8 shadow-xl mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-t-8 border-sahithyolsav">
                        <div><h1 class="text-3xl font-ssf uppercase">${prog.name}</h1><p class="text-xs font-bold text-gray-400 tracking-widest uppercase">${prog.category} | ${prog.stage_id}</p></div>
                        <div class="flex gap-2">
                            ${!hasStartedReveal ? `<button onclick="startProgramReveal('${prog.id}')" class="bg-black text-white px-6 py-2 rounded-full font-bold shadow-lg">Start Program Reveal</button>` : ''}
                            <button onclick="finishStageProgram('${prog.id}')" class="bg-green-600 text-white px-6 py-2 rounded-full font-bold shadow-lg">Submit Results to Admin</button>
                        </div>
                    </div>

                    <div class="grid gap-6">
                        ${parts.map(p => {
                            // As requested: "if all present participant take chess number then he can only view chess number only"
                            const showPrivacyView = allPresentScratched && p.attendance;
                            
                            return `
                            <div class="bg-white rounded-2xl shadow-md border p-6 flex flex-col lg:flex-row items-center gap-6 ${!p.attendance && hasStartedReveal ? 'opacity-30' : ''}">
                                
                                ${!showPrivacyView ? `
                                <div class="w-full lg:w-1/4">
                                    <div class="text-xs font-bold text-gray-400">ID: ${p.participation_number}</div>
                                    <div class="text-xl font-bold">${p.name}</div>
                                    <div class="text-sm font-bold text-sahithyolsav">${p.sector}</div>
                                </div>` : `
                                <div class="w-full lg:w-1/4 flex items-center gap-4">
                                    <div class="text-5xl font-ssf text-sahithyolsav">${p.chess_number}</div>
                                    <div class="text-[10px] font-bold text-gray-400 uppercase leading-none">Chess<br>Unit Active</div>
                                </div>`}

                                <div class="w-full lg:w-1/4 flex flex-col items-center ${!showPrivacyView ? 'border-l border-r border-gray-100 px-4' : ''}">
                                    ${!hasStartedReveal ? `
                                    <div class="flex items-center gap-2 mb-2">
                                        <input type="checkbox" ${p.attendance ? 'checked' : ''} onchange="markAttendance('${p.id}', this.checked)" class="w-6 h-6 accent-sahithyolsav cursor-pointer">
                                        <span class="text-sm font-bold uppercase">Mark Present</span>
                                    </div>` : ''}
                                    
                                    ${p.attendance ? `
                                    <div id="scratch-${p.id}" class="scratch-container ${p.chess_number ? 'scratched' : ''}" onclick="revealParticipantChess('${p.id}', '${id}')">
                                        <div class="scratch-overlay">SCRATCH ME</div>
                                        <span class="text-2xl font-ssf text-sahithyolsav">${p.chess_number || '?'}</span>
                                    </div>` : `<div class="text-xs text-gray-300 italic font-bold">ABSENT</div>`}
                                </div>

                                ${p.attendance ? `
                                <div class="${showPrivacyView ? 'w-full lg:w-2/4' : 'w-full lg:w-2/4'} grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div class="relative"><label class="text-[10px] font-bold text-gray-400 absolute top-1 left-2 uppercase">Score (0-100)</label>
                                        <input type="number" id="score-${p.id}" value="${p.score || ''}" class="w-full border pt-5 pb-1 px-3 rounded-xl font-bold text-lg focus:ring-1 focus:ring-sahithyolsav outline-none">
                                    </div>
                                    <div class="relative"><label class="text-[10px] font-bold text-gray-400 absolute top-1 left-2 uppercase">Feedback</label>
                                        <input type="text" id="fb-${p.id}" value="${p.feedback || ''}" class="w-full border pt-5 pb-1 px-3 rounded-xl text-sm focus:ring-1 focus:ring-sahithyolsav outline-none">
                                    </div>
                                    <button onclick="updateEntry('${p.id}', '${id}')" class="md:col-span-2 bg-sahithyolsav text-white py-2 rounded-xl font-bold text-xs uppercase shadow hover:bg-orange-600 transition">Sync with Admin</button>
                                </div>` : ''}
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        async function startProgramReveal(progId) {
            const { data: parts } = await supabaseClient.from('participants').select('*').eq('program_id', progId).eq('attendance', true);
            if(!parts.length) return showToast("No present participants marked", "error");
            
            // Randomly shuffle alphabet for present participants (A, B, C...)
            let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").slice(0, parts.length).sort(() => Math.random() - 0.5);
            
            showLoading(true);
            for (let i = 0; i < parts.length; i++) {
                await supabaseClient.from('participants').update({ chess_number: letters[i] }).eq('id', parts[i].id);
            }
            showLoading(false);
            openStageProgram(progId);
        }

        async function revealParticipantChess(pId, progId) {
            document.getElementById(`scratch-${pId}`).classList.add('scratched');
            // Check if all are revealed to toggle privacy view immediately
            setTimeout(() => openStageProgram(progId), 600);
        }

        async function updateEntry(partId, progId) {
            const score = document.getElementById(`score-${partId}`).value;
            const fb = document.getElementById(`fb-${partId}`).value;
            showLoading(true);
            await supabaseClient.from('participants').update({ score: score || 0, feedback: fb }).eq('id', partId);
            showLoading(false); 
            showToast("Details transferred to Admin login", "success");
        }

        async function finishStageProgram(id) {
            if(!confirm("Submit final results for Admin approval? This will lock current entries.")) return;
            await supabaseClient.from('programs').update({ status: 'completed' }).eq('id', id);
            navigate('stage');
        }

        async function markAttendance(id, present) { 
            await supabaseClient.from('participants').update({ attendance: present }).eq('id', id); 
        }

            toast.innerText = m; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000);
        }
        function openLoginModal() { document.getElementById('login-modal').classList.remove('hidden'); }
        function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); }
        function startCarousel() {
            let i = 0; setInterval(() => { i = (i + 1) % 2; const t = document.getElementById('carousel-track'); if(t) t.style.transform = `translateX(-${i * 100}%)`; }, 5000);
        }

        window.onload = () => navigate('home');

        async function loadPublicResults() {
            const { data } = await supabaseClient.from('programs').select('*').eq('results_published', true);

            if (data && grid) {
                document.getElementById('published-count').innerText = data.length;

                    <svg class="w-5 h-5 text-sahithyolsav" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
                </div>`).join('');
            }
        }

        async function fetchAdminPrograms() {
            const { data } = await supabaseClient.from('programs').select('*').order('date_time', { ascending: false });
            const list = document.getElementById('admin-programs-list');
            if (data && list) list.innerHTML = data.map(p => `<div class="bg-white p-4 rounded-xl border flex justify-between items-center">

        async function fetchAdminResultsApproval() {
            const { data } = await supabaseClient.from('programs').select('*').eq('status', 'completed').eq('results_published', false);
            const list = document.getElementById('admin-results-approval');
            if (data && list) {
                if(data.length === 0) list.innerHTML = `<div class="p-8 text-center text-gray-300 font-bold italic">Queue empty: No programs completed yet</div>`;
                else list.innerHTML = data.map(p => `<div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm"><div><div class="font-bold">${p.name}</div><div class="text-[10px] text-sahithyolsav uppercase font-bold tracking-widest">${p.category}</div></div><button onclick="publishPublicResult('${p.id}')" class="bg-green-600 text-white px-5 py-2 rounded-full font-bold text-xs uppercase shadow hover:bg-green-700">Approve & Live Publish</button></div>`).join('');

        async function publishPublicResult(id) {
            await supabaseClient.from('programs').update({ results_published: true }).eq('id', id);
            showToast("Success: Results are now visible to public", "success"); fetchAdminResultsApproval();
        }

        async function processExcel(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                showLoading(true);
                for (let row of jsonData) {
                    let { data: prog } = await supabaseClient.from('programs').select('id').eq('name', row.ProgramName || row.Program).single();
                    if (!prog) {
                        const { data: newP } = await supabaseClient.from('programs').insert({ name: row.ProgramName || row.Program, category: row.Category || 'General', stage_id: 'Stage 1' }).select().single();
                        prog = newP;
                    }
                    await supabaseClient.from('participants').insert({ program_id: prog.id, participation_number: String(row.ParticipationNumber || row.Participation_Number || row['Participation#']), name: row.Name, sector: row.Sector });
                }
                showLoading(false); showToast("Import Finished", "success"); adminSub('participants');
            };
            reader.readAsArrayBuffer(file);
        }

    </script>
